name: Build Optimized APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch APK
        run: |
          set -ex
          # Debug: show available tools
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la
          
          # Original APK is already checked out
          cp pdf-editor.apk pdf-editor-patched.apk
          
          # Remove old signature
          zip -d pdf-editor-patched.apk "META-INF/*" || true
          
          # Update index.html
          zip -u pdf-editor-patched.apk assets/index.html
          
          # Add bundled pdf.js files
          zip -u pdf-editor-patched.apk assets/pdf.min.mjs
          zip -u pdf-editor-patched.apk assets/pdf.worker.min.mjs
          zip -u pdf-editor-patched.apk assets/pdf-lib.min.js
          
          echo "=== Files in APK ==="
          unzip -l pdf-editor-patched.apk | head -8
          
      - name: Sign APK
        run: |
          set -ex
          
          # Find build tools
          BUILD_TOOLS=$(ls -d ${ANDROID_SDK_ROOT}/build-tools/* 2>/dev/null | tail -1)
          echo "BUILD_TOOLS=$BUILD_TOOLS"
          
          # Generate keystore
          keytool -genkey -v -noprompt \
            -alias pdfeditor \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore build.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=PDF Editor, OU=Dev, O=PDFEditor, L=Unknown, ST=Unknown, C=CN"
          
          # Align (BEFORE signing!)
          ${BUILD_TOOLS}/zipalign -f -p 4 pdf-editor-patched.apk pdf-editor-aligned.apk
          
          # Sign
          ${BUILD_TOOLS}/apksigner sign \
            --ks build.keystore \
            --ks-key-alias pdfeditor \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --out pdf-editor-optimized.apk \
            pdf-editor-aligned.apk
          
          echo "=== APK Info ==="
          ls -la pdf-editor-optimized.apk
          ${BUILD_TOOLS}/apksigner verify --verbose pdf-editor-optimized.apk || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-optimized
          path: pdf-editor-optimized.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pdf-editor-optimized.apk
          generate_release_notes: true
