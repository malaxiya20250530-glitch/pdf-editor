<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>PDF 纯净阅读</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1b26'/><path d='M28 20 L28 80 L72 80 L72 48 L60 48 L60 36 L48 36 L48 20 Z' fill='%23c0caf5'/><path d='M48 20 L48 36 L60 36 Z' fill='%23565f89'/></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--reader-bg:#f5f0e8;--reader-text:#2c2c2c;--overlay-bg:rgba(0,0,0,.35);--glass-bg:rgba(30,32,48,.82);--glass-border:rgba(255,255,255,.08);--accent:#7aa2f7;--text2:#9aa5ce;--radius:12px}
body{background:var(--reader-bg);color:var(--reader-text);height:100vh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Noto Serif SC','Source Han Serif SC',serif}

/* ===== Zero-UI 阅读器 ===== */
#reader{position:fixed;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;background:var(--reader-bg)}
#reader::-webkit-scrollbar{width:0;height:0}
.page-container{display:flex;flex-direction:column;align-items:center;padding:0;min-height:100vh}
.page-container img{display:block;width:100%;height:auto;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.page-container .page-slot{margin:0;width:100%}
.page-slot .page-num{display:none}

/* 瀑布流翻页 */
.waterfall .page-slot{margin:0 auto;width:100%}

/* ===== 智能反色模式 ===== */
body.dark-reader{background:#1a1b26;color:#c0caf5}
.dark-reader .page-container img{filter:invert(0.92) hue-rotate(180deg) contrast(0.88);background:#1a1b26}

/* ===== HUD 毛玻璃菜单 ===== */
.hud{position:fixed;left:0;right:0;pointer-events:none;opacity:0;transition:opacity .28s ease;z-index:100}
.hud.show{opacity:1;pointer-events:auto}

/* 顶部 HUD */
.hud-top{top:0;padding:env(safe-area-inset-top,12px) 12px 12px;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,transparent 100%)}
.hud-top .row{display:flex;align-items:center;gap:4px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);padding:4px 6px}
.hud-top button{background:transparent;border:none;color:#e0e4f0;width:38px;height:38px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.hud-top button:hover,.hud-top button:active{background:rgba(255,255,255,.1)}
.hud-top .spacer{flex:1}
.hud-top .title{font-size:13px;color:#b0b8d0;font-weight:500;margin:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;font-family:-apple-system,sans-serif}

/* 底部 HUD */
.hud-bottom{bottom:0;padding:12px 12px env(safe-area-inset-bottom,12px);background:linear-gradient(0deg,rgba(0,0,0,.5) 0%,transparent 100%)}
.hud-bottom .row{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);padding:8px 16px}
.slider-row{display:flex;align-items:center;gap:12px}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.15);outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#7aa2f7;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.slider-row .page-bubble{min-width:52px;text-align:center;font-size:14px;font-weight:600;color:#fff;font-family:-apple-system,sans-serif}

/* 页码气泡（拖拽时显示大字） */
#pageBubble{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:56px;font-weight:700;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;z-index:200;opacity:0;transition:opacity .15s;font-family:-apple-system,sans-serif}
#pageBubble.show{opacity:1}

/* ===== 侧边抽屉（目录/缩略图） ===== */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:-280px;bottom:0;width:260px;background:#1e2030;z-index:95;transition:left .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,12px)}
.drawer.show{left:0}
.drawer-header{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);gap:8px}
.drawer-header span{font-size:14px;font-weight:600;color:#c0caf5;font-family:-apple-system,sans-serif}
.drawer-header button{margin-left:auto;background:transparent;border:none;color:#565f89;font-size:20px;cursor:pointer;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.drawer-list{flex:1;overflow-y:auto;padding:8px}
.drawer-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;color:#9aa5ce;font-size:13px;transition:background .12s;margin-bottom:2px;font-family:-apple-system,sans-serif}
.drawer-item:hover,.drawer-item.active{background:rgba(122,162,247,.1);color:#c0caf5}
.drawer-item .num{min-width:28px;text-align:right;color:#565f89;font-size:11px}

/* ===== 编辑模式 ===== */
#editor{display:none;height:100vh;flex-direction:column}
#editor.active{display:flex}
.edit-toolbar{display:flex;align-items:center;gap:2px;height:44px;padding:0 8px;background:#1e2030;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;flex-wrap:nowrap;overflow-x:auto}
.edit-toolbar::-webkit-scrollbar{height:0}
.edit-toolbar .group{display:flex;align-items:center;gap:1px;flex-shrink:0}
.edit-toolbar .group+.group{border-left:1px solid rgba(255,255,255,.08);margin-left:4px;padding-left:8px}
.edit-toolbar button{height:30px;padding:0 8px;border:none;background:transparent;color:#9aa5ce;border-radius:6px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0}
.edit-toolbar button:active{background:rgba(122,162,247,.15)}
.edit-toolbar button.primary{background:#3d59a1;color:#fff;padding:0 12px}
.edit-toolbar .spacer{flex:1}
.edit-content{flex:1;overflow:auto;background:#1a1b26;display:flex;align-items:center;justify-content:center;padding:20px}
.edit-content canvas{box-shadow:0 4px 24px rgba(0,0,0,.4);border-radius:2px;max-width:100%}

/* ===== 网页面 ===== */
#landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--reader-bg);z-index:50;gap:16px;padding:20px}
#landing.hidden{display:none}
.landing-icon{font-size:64px;opacity:.4;margin-bottom:8px}
.landing-title{font-size:18px;color:#666;font-weight:500}
.landing-hint{font-size:13px;color:#999}
.landing-btn{padding:12px 32px;border-radius:12px;border:none;background:#3d59a1;color:#fff;font-size:15px;cursor:pointer;margin-top:8px}

/* ===== 模态框 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(8px)}
.modal-overlay.hidden{display:none}
.modal{background:#1e2030;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;min-width:320px;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h3{font-size:15px;color:#c0caf5;margin-bottom:14px;font-weight:600;font-family:-apple-system,sans-serif}
.modal .row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px}
.modal .row label{min-width:64px;color:#565f89;font-size:12px}
.modal .row input,.modal .row select{flex:1;padding:8px;background:#1a1b26;border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#c0caf5;font-size:13px;outline:none}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal .actions button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px}
.modal .actions .btn-ok{background:#3d59a1;color:#fff}
.modal .actions .btn-cancel{background:#242538;color:#9aa5ce}
input[type=file]{display:none}

/* 视觉设置面板 */
.settings-panel{position:fixed;bottom:0;left:0;right:0;background:#1e2030;border-radius:16px 16px 0 0;padding:20px 24px env(safe-area-inset-bottom,20px);z-index:150;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(20px)}
.settings-panel.show{transform:translateY(0)}
.settings-panel .row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.settings-panel label{color:#9aa5ce;font-size:13px;min-width:56px}
.settings-panel input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.12)}
.settings-panel input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#7aa2f7}

/* 提示 toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;z-index:500;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* ===== 暗色阅读模式专属配色 ===== */
.dark-reader #landing{background:#1a1b26}
.dark-reader .landing-title{color:#c0caf5}
.dark-reader .landing-hint{color:#565f89}

@media(max-width:480px){.drawer{width:220px;left:-220px}.hud-top .title{max-width:120px}}
</style>
</head>
<body>

<!-- 着陆页 -->
<div id="landing">
  <div class="landing-icon">📖</div>
  <div class="landing-title">纯净阅读</div>
  <div class="landing-hint">点击下方按钮或拖入 PDF 文件</div>
  <button class="landing-btn" onclick="document.getElementById('fileInput').click()">📂 打开 PDF</button>
  <input type="file" id="fileInput" accept=".pdf" onchange="openFile(event)">
</div>

<!-- Zero-UI 阅读器 -->
<div id="reader" onclick="toggleHUD()">
  <div class="page-container" id="pageContainer"></div>
</div>

<!-- 页码气泡 -->
<div id="pageBubble">-</div>

<!-- HUD 顶部 -->
<div class="hud hud-top" id="hudTop">
  <div class="row">
    <button onclick="closeFile()" title="关闭">✕</button>
    <button onclick="toggleDrawer()" title="目录">☰</button>
    <span class="title" id="fileName">PDF</span>
    <div class="spacer"></div>
    <button onclick="toggleSettings()" title="视觉设置">☀</button>
    <button onclick="switchToEditor()" title="编辑">✎</button>
    <button onclick="showMoreMenu()" title="更多">⋯</button>
  </div>
</div>

<!-- HUD 底部 -->
<div class="hud hud-bottom" id="hudBottom">
  <div class="row">
    <div class="slider-row">
      <span class="page-bubble" id="pageLabel">1 / 1</span>
      <input type="range" id="pageSlider" min="0" max="0" value="0" oninput="onSliderInput(this)" onchange="onSliderChange(this)">
    </div>
  </div>
</div>

<!-- 设置面板 -->
<div class="settings-panel" id="settingsPanel">
  <div class="row">
    <label>☀ 亮度</label>
    <input type="range" id="brightnessSlider" min="0.3" max="1.5" step="0.05" value="1.0" oninput="setBrightness(this.value)">
  </div>
  <div class="row">
    <label>🌙 夜间</label>
    <button onclick="toggleDarkMode()" style="flex:1;padding:8px;border-radius:8px;border:none;background:#242538;color:#c0caf5;cursor:pointer;font-size:13px" id="darkModeBtn">切换反色模式</button>
  </div>
  <div class="row">
    <label>📐 切边</label>
    <button onclick="toggleCrop()" style="flex:1;padding:8px;border-radius:8px;border:none;background:#242538;color:#c0caf5;cursor:pointer;font-size:13px" id="cropBtn">智能切边: 关</button>
  </div>
  <div class="row">
    <label>📄 页面</label>
    <button onclick="togglePageMode()" style="flex:1;padding:8px;border-radius:8px;border:none;background:#242538;color:#c0caf5;cursor:pointer;font-size:13px" id="pageModeBtn">模式: 单页</button>
  </div>
</div>

<!-- 侧边抽屉 -->
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span>📄 目录</span>
    <button onclick="toggleDrawer()">✕</button>
  </div>
  <div class="drawer-list" id="drawerList">
    <div style="color:#565f89;text-align:center;padding:20px;font-size:13px">加载中...</div>
  </div>
</div>

<!-- 更多菜单（隐藏管理功能） -->
<div class="modal-overlay hidden" id="moreModal">
  <div class="modal">
    <h3>⋯ 更多</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button onclick="savePDF()" style="padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:#242538;color:#c0caf5;cursor:pointer;font-size:13px">💾 保存</button>
      <button onclick="openMergeModal()" style="padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:#242538;color:#c0caf5;cursor:pointer;font-size:13px">📑 合并</button>
      <button onclick="rotateAll()" style="padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:#242538;color:#c0caf5;cursor:pointer;font-size:13px">↻ 旋转</button>
      <button onclick="extractPage()" style="padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:#242538;color:#c0caf5;cursor:pointer;font-size:13px">✂ 提取</button>
      <button onclick="deletePage()" style="padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:#242538;color:#f7768e;cursor:pointer;font-size:13px">🗑 删除</button>
      <button onclick="showFileInfo()" style="padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:#242538;color:#c0caf5;cursor:pointer;font-size:13px">ℹ 信息</button>
    </div>
    <div class="actions" style="margin-top:12px">
      <button class="btn-cancel" onclick="closeMoreModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 编辑区域（隐藏，从阅读器切换） -->
<div id="editor">
  <div class="edit-toolbar">
    <button onclick="switchToReader()" style="color:#7aa2f7">◀ 阅读</button>
    <div class="spacer"></div>
    <button onclick="document.getElementById('fileInput').click()">📂</button>
    <button onclick="openMergeModal()">📑</button>
    <div class="group">
      <button onclick="rotatePage(-90)">↺</button>
      <button onclick="deletePage()" style="color:#f7768e">🗑</button>
      <button onclick="extractPage()">✂</button>
    </div>
    <div class="group">
      <button onclick="openTextModal()">📝</button>
      <button onclick="openSignatureModal()">✍</button>
    </div>
    <button onclick="savePDF()" class="primary">💾 保存</button>
  </div>
  <div class="edit-content" id="editContent"></div>
</div>

<!-- 编辑用模态框 -->
<div class="modal-overlay hidden" id="textModal">
  <div class="modal">
    <h3>📝 添加文字</h3>
    <div class="row"><label>内容</label><input id="textContent" placeholder="输入文字..."></div>
    <div class="row"><label>大小</label><input id="textSize" type="number" value="24"></div>
    <div class="row"><label>颜色</label><input id="textColor" type="color" value="#000000"></div>
    <div class="row"><label>X</label><input id="textX" type="number" value="50"><label>Y</label><input id="textY" type="number" value="100"></div>
    <div class="actions">
      <button class="btn-cancel" onclick="closeTextModal()">取消</button>
      <button class="btn-ok" onclick="addText()">添加</button>
    </div>
  </div>
</div>
<div class="modal-overlay hidden" id="sigModal">
  <div class="modal" style="min-width:360px">
    <h3>✍ 签名</h3>
    <canvas id="sigCanvas" style="width:320px;height:140px;background:#fff;border-radius:8px;display:block;margin:0 auto 12px;touch-action:none;cursor:crosshair"></canvas>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:8px">
      <button onclick="clearSignature()" style="padding:6px 12px;border-radius:6px;border:none;background:#242538;color:#c0caf5;cursor:pointer">🗑 清除</button>
      <button onclick="setSigColor('#000')" style="width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:#000;cursor:pointer"></button>
      <button onclick="setSigColor('#1e88e5')" style="width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:#1e88e5;cursor:pointer"></button>
      <button onclick="setSigColor('#e53935')" style="width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:#e53935;cursor:pointer"></button>
    </div>
    <div class="actions">
      <button class="btn-cancel" onclick="closeSignatureModal()">取消</button>
      <button class="btn-ok" onclick="addSignature()">添加</button>
    </div>
  </div>
</div>
<div class="modal-overlay hidden" id="mergeModal">
  <div class="modal">
    <h3>📑 合并 PDF</h3>
    <div class="row"><label>当前</label><span id="mergeCurrent" style="color:#9aa5ce">-</span></div>
    <button onclick="document.getElementById('mergeInput').click()" style="width:100%;padding:10px;border-radius:8px;border:1px dashed rgba(255,255,255,.15);background:transparent;color:#9aa5ce;cursor:pointer;margin-bottom:8px">+ 选择要合并的文件</button>
    <input type="file" id="mergeInput" accept=".pdf" multiple onchange="onMergeFilesSelected(event)">
    <div id="mergeFileList" style="font-size:12px;color:#565f89;max-height:100px;overflow-y:auto"></div>
    <div class="actions">
      <button class="btn-cancel" onclick="closeMergeModal()">取消</button>
      <button class="btn-ok" onclick="doMerge()">合并 & 下载</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

// ===== 状态 =====
let pdfDoc = null, pdfBytes = null, currentPage = 1, zoom = 1.0
let _insertFileData = null, mergeFiles = [], _pdfFileName = ''
let isDarkMode = false, isCropped = false, pageMode = 'single'
const reader = document.getElementById('reader'), container = document.getElementById('pageContainer')
const drawerList = document.getElementById('drawerList')

// ===== 打开文件 =====
async function openFile(e) {
  const file = e.target.files[0]; if (!file) return
  _pdfFileName = file.name
  document.getElementById('fileName').textContent = file.name
  const buf = await file.arrayBuffer()
  pdfBytes = new Uint8Array(buf)
  pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise
  document.getElementById('landing').classList.add('hidden')
  document.getElementById('pageSlider').max = pdfDoc.numPages - 1
  renderPage(1)
  buildDrawer()
  document.getElementById('mergeCurrent').textContent = `${pdfDoc.numPages} 页`
}

// ===== 渲染页面（纯净模式） =====
async function renderPage(num) {
  if (!pdfDoc) return
  currentPage = Math.max(1, Math.min(num, pdfDoc.numPages))
  
  if (pageMode === 'waterfall') {
    await renderWaterfall()
    return
  }
  
  container.innerHTML = ''
  const page = await pdfDoc.getPage(currentPage)
  const vp = page.getViewport({ scale: zoom })
  const canvas = document.createElement('canvas')
  canvas.width = vp.width
  canvas.height = vp.height
  canvas.style.cssText = 'width:100%;height:auto'
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise
  
  const slot = document.createElement('div')
  slot.className = 'page-slot'
  slot.appendChild(canvas)
  
  if (isCropped) {
    // 智能切边：裁剪四周5%白边
    slot.style.cssText = 'width:90%;margin:0 auto'
    canvas.style.cssText = 'width:100%;height:auto;clip-path:inset(4% 5% 6% 5%)'
  }
  
  container.appendChild(slot)
  reader.scrollTop = 0
  updateSlider()
}

// ===== 瀑布流渲染 =====
async function renderWaterfall() {
  container.innerHTML = ''
  const fragment = document.createDocumentFragment()
  const scale = zoom * 0.5
  
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i)
    const vp = page.getViewport({ scale })
    const canvas = document.createElement('canvas')
    canvas.width = vp.width
    canvas.height = vp.height
    canvas.style.cssText = 'width:100%;height:auto;margin-bottom:4px'
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise
    fragment.appendChild(canvas)
  }
  container.appendChild(fragment)
  updateSlider()
}

// ===== HUD 切换 =====
let hudTimer = null
function toggleHUD() {
  const t=document.getElementById('hudTop'),b=document.getElementById('hudBottom')
  const shown = t.classList.contains('show')
  t.classList.toggle('show'); b.classList.toggle('show')
  clearTimeout(hudTimer)
  if (!shown) {
    document.getElementById('settingsPanel').classList.remove('show')
    hudTimer = setTimeout(() => { t.classList.remove('show'); b.classList.remove('show') }, 4000)
  }
}

// ===== 滑块 =====
function updateSlider() {
  const s = document.getElementById('pageSlider')
  const l = document.getElementById('pageLabel')
  if (pdfDoc) {
    s.max = pdfDoc.numPages - 1
    s.value = currentPage - 1
    l.textContent = `${currentPage} / ${pdfDoc.numPages}`
  }
}

function onSliderInput(el) {
  const bubble = document.getElementById('pageBubble')
  const page = parseInt(el.value) + 1
  bubble.textContent = `${page} / ${pdfDoc.numPages}`
  bubble.classList.add('show')
}

function onSliderChange(el) {
  document.getElementById('pageBubble').classList.remove('show')
  renderPage(parseInt(el.value) + 1)
}

// ===== 侧边抽屉 =====
function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('show')
  document.getElementById('drawerOverlay').classList.toggle('show')
}

async function buildDrawer() {
  if (!pdfDoc) return
  drawerList.innerHTML = ''
  const frag = document.createDocumentFragment()
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const div = document.createElement('div')
    div.className = 'drawer-item' + (i === currentPage ? ' active' : '')
    div.innerHTML = `<span class="num">${i}</span><span>第 ${i} 页</span>`
    div.onclick = () => { renderPage(i); toggleDrawer() }
    frag.appendChild(div)
  }
  drawerList.appendChild(frag)
}

// ===== 设置 =====
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('show')
}

function setBrightness(v) {
  reader.style.filter = `brightness(${v})`
}

function toggleDarkMode() {
  isDarkMode = !isDarkMode
  document.body.classList.toggle('dark-reader', isDarkMode)
  document.getElementById('darkModeBtn').textContent = isDarkMode ? '恢复日间模式' : '切换反色模式'
}

function toggleCrop() {
  isCropped = !isCropped
  document.getElementById('cropBtn').textContent = `智能切边: ${isCropped ? '开' : '关'}`
  if (pdfDoc) renderPage(currentPage)
}

function togglePageMode() {
  pageMode = pageMode === 'single' ? 'waterfall' : 'single'
  document.getElementById('pageModeBtn').textContent = `模式: ${pageMode === 'single' ? '单页' : '瀑布'}`
  if (pdfDoc) renderPage(currentPage)
}

// ===== 关闭 / 切换编辑 =====
function closeFile() {
  pdfDoc = null; pdfBytes = null
  container.innerHTML = ''
  document.getElementById('landing').classList.remove('hidden')
  document.getElementById('hudTop').classList.remove('show')
  document.getElementById('hudBottom').classList.remove('show')
}

function switchToEditor() {
  if (!pdfDoc) return
  document.getElementById('reader').style.display = 'none'
  document.getElementById('hudTop').classList.remove('show')
  document.getElementById('hudBottom').classList.remove('show')
  document.getElementById('editor').classList.add('active')
  renderEditPage()
}

function switchToReader() {
  document.getElementById('editor').classList.remove('active')
  document.getElementById('reader').style.display = ''
  renderPage(currentPage)
}

async function renderEditPage() {
  if (!pdfDoc) return
  const page = await pdfDoc.getPage(currentPage)
  const vp = page.getViewport({ scale: 1.5 })
  const canvas = document.createElement('canvas')
  canvas.width = vp.width; canvas.height = vp.height
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise
  const ec = document.getElementById('editContent')
  ec.innerHTML = ''; ec.appendChild(canvas)
}

// ===== 编辑功能（简化） =====
async function addText() {
  if (!pdfBytes) return
  const { PDFDocument, StandardFonts, rgb } = PDFLib
  const doc = await PDFDocument.load(pdfBytes)
  const page = doc.getPage(currentPage - 1)
  const { height } = page.getSize()
  const text = document.getElementById('textContent').value || '文字'
  const size = +document.getElementById('textSize').value || 24
  const c = document.getElementById('textColor').value
  const x = +document.getElementById('textX').value || 50
  const y = +document.getElementById('textY').value || 100
  const font = await doc.embedFont(StandardFonts.Helvetica)
  page.drawText(text, { x, y: height - y, size, font,
    color: PDFLib.rgb(parseInt(c.slice(1,3),16)/255, parseInt(c.slice(3,5),16)/255, parseInt(c.slice(5,7),16)/255) })
  pdfBytes = await doc.save()
  await reload()
  closeTextModal()
}

let _sigCtx = null, _sigDrawing = false, _sigColor = '#000'
function openTextModal() { document.getElementById('textModal').classList.remove('hidden') }
function closeTextModal() { document.getElementById('textModal').classList.add('hidden') }
function openSignatureModal() { document.getElementById('sigModal').classList.remove('hidden'); setTimeout(initSig, 100) }
function closeSignatureModal() { document.getElementById('sigModal').classList.add('hidden') }

function initSig() {
  const c = document.getElementById('sigCanvas')
  c.width = c.offsetWidth*2; c.height = c.offsetHeight*2
  _sigCtx = c.getContext('2d'); _sigCtx.scale(2,2)
  _sigCtx.strokeStyle = _sigColor; _sigCtx.lineWidth = 2.5; _sigCtx.lineCap = 'round'
  const down = e => { const r=c.getBoundingClientRect(); _sigDrawing=true; _sigCtx.beginPath(); _sigCtx.moveTo((e.touches?e.touches[0].clientX:e.clientX)-r.left,(e.touches?e.touches[0].clientY:e.clientY)-r.top) }
  const move = e => { if(!_sigDrawing)return;const r=c.getBoundingClientRect();_sigCtx.lineTo((e.touches?e.touches[0].clientX:e.clientX)-r.left,(e.touches?e.touches[0].clientY:e.clientY)-r.top);_sigCtx.stroke() }
  c.onmousedown=down; c.onmousemove=move; c.onmouseup=()=>_sigDrawing=false
  c.ontouchstart=down; c.ontouchmove=move; c.ontouchend=()=>_sigDrawing=false
}

function setSigColor(c) { _sigColor=c; if(_sigCtx) _sigCtx.strokeStyle=c }
function clearSignature() { if(_sigCtx) _sigCtx.clearRect(0,0,400,200) }

async function addSignature() {
  if(!pdfBytes||!_sigCtx)return
  const imgData=_sigCtx.getImageData(0,0,document.getElementById('sigCanvas').width,document.getElementById('sigCanvas').height)
  if(!imgData.data.some(v=>v!==0)){alert('请先签名');return}
  const {PDFDocument}=PDFLib; const doc=await PDFDocument.load(pdfBytes)
  const page=doc.getPage(currentPage-1); const {width,height}=page.getSize()
  const png=await doc.embedPng(document.getElementById('sigCanvas').toDataURL('image/png'))
  png.scale(0.5); page.drawImage(png,{x:width/2-100,y:50})
  pdfBytes=await doc.save(); await reload(); closeSignatureModal()
}

async function reload() {
  pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise
  renderPage(currentPage)
}

function rotatePage(d) {
  if(!pdfBytes)return; (async()=>{const{PDFDocument}=PDFLib;const doc=await PDFDocument.load(pdfBytes)
  doc.getPage(currentPage-1).setRotation(doc.getPage(currentPage-1).getRotation().angle+d)
  pdfBytes=await doc.save(); await reload()})()
}
function rotateAll() { if(!pdfBytes)return; (async()=>{const{PDFDocument}=PDFLib;const doc=await PDFDocument.load(pdfBytes)
  doc.getPages().forEach(p=>p.setRotation((p.getRotation().angle+90)%360))
  pdfBytes=await doc.save(); await reload(); closeMoreModal()})()
}
function extractPage() { if(!pdfBytes)return; (async()=>{const{PDFDocument}=PDFLib;const doc=await PDFDocument.create()
  const src=await PDFDocument.load(pdfBytes); const[c]=await doc.copyPages(src,[currentPage-1]); doc.addPage(c)
  downloadBlob(await doc.save(),`page_${currentPage}.pdf`); closeMoreModal()})()
}
function deletePage() { if(!pdfBytes||pdfDoc.numPages<=1)return
  if(!confirm(`删除第 ${currentPage} 页？`))return
  ;(async()=>{const{PDFDocument}=PDFLib;const doc=await PDFDocument.load(pdfBytes)
  doc.removePage(currentPage-1); pdfBytes=await doc.save(); await reload()
  renderPage(Math.min(currentPage,pdfDoc.numPages))})(); closeMoreModal()
}
async function savePDF() { if(!pdfBytes)return
  const{PDFDocument}=PDFLib;const doc=await PDFDocument.load(pdfBytes);const b=await doc.save()
  downloadBlob(b,_pdfFileName||'edited.pdf'); closeMoreModal()
}
function downloadBlob(b,n){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([b],{type:'application/pdf'}));a.download=n;a.click()}
function showFileInfo(){alert(`文件名: ${_pdfFileName||'未知'}\n页数: ${pdfDoc?pdfDoc.numPages:0}\n文件大小: ${pdfBytes?`${(pdfBytes.length/1024/1024).toFixed(1)} MB`:''}`);closeMoreModal()}
function showMoreMenu(){document.getElementById('moreModal').classList.remove('hidden')}
function closeMoreModal(){document.getElementById('moreModal').classList.add('hidden')}

// ===== 合并 =====
function openMergeModal(){document.getElementById('mergeModal').classList.remove('hidden')}
function closeMergeModal(){document.getElementById('mergeModal').classList.add('hidden')}
function onMergeFilesSelected(e){mergeFiles=Array.from(e.target.files).filter(f=>f.type==='application/pdf')
  document.getElementById('mergeFileList').innerHTML=mergeFiles.map((f,i)=>`<div>📄 ${i+1}. ${f.name}</div>`).join('')}
async function doMerge(){if(!pdfBytes&&mergeFiles.length===0)return
  const{PDFDocument}=PDFLib;const m=await PDFDocument.create()
  if(pdfBytes){const s=await PDFDocument.load(pdfBytes);(await m.copyPages(s,s.getPageIndices())).forEach(p=>m.addPage(p))}
  for(const f of mergeFiles){const b=await f.arrayBuffer();const s=await PDFDocument.load(b);(await m.copyPages(s,s.getPageIndices())).forEach(p=>m.addPage(p))}
  downloadBlob(await m.save(),'merged.pdf');closeMergeModal()}

// ===== 键盘快捷键 =====
document.addEventListener('keydown',e=>{
  if(!pdfDoc||e.target.tagName==='INPUT')return
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();renderPage(currentPage-1)}
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();renderPage(currentPage+1)}
})

// ===== 触摸翻页（阅读模式） =====
let touchStartX = 0, touchStartY = 0
reader.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX
  touchStartY = e.touches[0].clientY
}, { passive: true })
reader.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX
  const dy = e.changedTouches[0].clientY - touchStartY
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) renderPage(currentPage + 1)
    else renderPage(currentPage - 1)
  }
  if (Math.abs(dy) > 60 && Math.abs(dy) > Math.abs(dx) * 1.5) {
    if (dy < 0) renderPage(currentPage + 1)
    else renderPage(currentPage - 1)
  }
}, { passive: true })
